name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — Build, Lint, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.railway.app/api/v1
          VITE_API_TOKEN: ci-placeholder-token
          VITE_SYMBOLS: BTC-USDT,ETH-USDT,SOL-USDT
          VITE_DEFAULT_SYMBOL: BTC-USDT
          VITE_DEFAULT_TIMEFRAME: 1m

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Audit backend dependencies
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
